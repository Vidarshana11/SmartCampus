name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build backend JAR
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend distribution
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Archive frontend dist
        run: tar -czf frontend-dist.tar.gz -C frontend dist

      - name: Upload CD backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-release
          path: backend/build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload CD frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-release
          path: frontend-dist.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend/build/libs/*.jar
            frontend-dist.tar.gz
